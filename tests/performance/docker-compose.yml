      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ./cfgs/longpull.ron:/etc/tgin/config.ron
    environment:
      - TELEGRAM_API_URL=http://10.5.0.3:8090/bot123:test/getUpdates
    depends_on:
      bench:
        condition: service_healthy
    healthcheck: *tgin-healthcheck-3030
    ports:
      - "3030:3030"
    networks:
      testing_net:
        ipv4_address: 10.5.0.21

  tgin_longpull_one:

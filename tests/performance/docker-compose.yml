x-bot-healthcheck: &bot-healthcheck
  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=1)"]
  interval: 2s
  timeout: 1s
  retries: 30

x-bench-healthcheck: &bench-healthcheck
  test: ["CMD", "tgin-bench", "--version"]
  interval: 2s
  timeout: 1s
  retries: 30

x-tgin-healthcheck-3000: &tgin-healthcheck-3000
  test: ["CMD-SHELL", "grep -q ':0BB8 ' /proc/net/tcp /proc/net/tcp6"]
  interval: 2s
  timeout: 1s
  retries: 30

x-tgin-healthcheck-3030: &tgin-healthcheck-3030
  test: ["CMD-SHELL", "grep -q ':0BD6 ' /proc/net/tcp /proc/net/tcp6"]
  interval: 2s
  timeout: 1s
  retries: 30

services:
  tgin_webhook:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ./cfgs/webhook.ron:/etc/tgin/config.ron
    depends_on:
      webhook_bot1:
        condition: service_healthy
      webhook_bot2:
        condition: service_healthy
    healthcheck: *tgin-healthcheck-3000
    ports:
      - "3000:3000"
    networks:
      testing_net:
        ipv4_address: 10.5.0.2

  tgin_webhook_one:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ./cfgs/webhook-one.ron:/etc/tgin/config.ron
    depends_on:
      webhook_bot1:
        condition: service_healthy
    healthcheck: *tgin-healthcheck-3000
    ports:
      - "3000:3000"
    networks:
      testing_net:
        ipv4_address: 10.5.0.2

  tgin_longpull:
